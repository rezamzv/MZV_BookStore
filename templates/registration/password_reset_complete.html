{% extends '_base.html' %}
{% load static %}

{% block title %}Password reset complete — Reza's Book Store{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/accounts.css' %}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-ornament">❧</div>
        <h1 class="auth-title">All done</h1>
        <div class="auth-divider"><span></span><em>❧</em><span></span></div>
        <p class="auth-message">
            Your password has been reset.<br>
            You can now log in with your new password.
        </p>
        <a href="{% url 'login' %}" class="auth-btn-primary">Log In</a>
    </div>
</div>
{% endblock %}
