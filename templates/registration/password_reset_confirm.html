{% extends '_base.html' %}
{% load static %}

{% block title %}Set new password — Reza's Book Store{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/accounts.css' %}">
{% endblock %}

{% block content %}
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-ornament">❧</div>
            <h1 class="auth-title">Set new password</h1>
            <p class="auth-subtitle">Choose a strong password</p>
            <div class="auth-divider"><span></span><em>❧</em><span></span></div>

            <form method="post">
                {% csrf_token %}

                {{ form.errors }}
                {{ form.non_field_errors }}

                <input id="login-custom-input"
                       type="password"
                       name="new_password1"
                       id="id_new_password1"
                       placeholder="New password"
                       class="auth-input"
                />
                <input id="login-custom-input"
                       type="password"
                       name="new_password2"
                       id="id_new_password2"
                       placeholder="Confirm new password"
                       class="auth-input"
                />
                <button type="submit" class="auth-btn-primary">Set Password</button>
            </form>
        </div>
    </div>
{% endblock %}
