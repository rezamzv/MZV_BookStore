{% extends '_base.html' %}
{% load static %}

{% block title %}Change password — Reza's Book Store{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/accounts.css' %}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-ornament">❧</div>
        <h1 class="auth-title">Change password</h1>
        <p class="auth-subtitle">Choose a new password</p>
        <div class="auth-divider"><span></span><em>❧</em><span></span></div>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="auth-btn-primary">Change Password</button>
        </form>
    </div>
</div>
{% endblock %}
